buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
        // Tell react-native-svg (and similar libs) where react-native lives
        // so they don't shell out to `node` (which Android Studio can't find).
        REACT_NATIVE_NODE_MODULES_DIR = "$rootDir/../node_modules/react-native"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

// Force compileSdk on all library subprojects that use the deprecated
// compileSdkVersion property (e.g. react-native-svg).
subprojects { sub ->
    sub.plugins.withId("com.android.library") {
        sub.android {
            compileSdk rootProject.ext.compileSdkVersion
        }
    }
}
